<svg viewBox="-20 -20 440 500" xmlns="http://www.w3.org/2000/svg" width="400" height="500">
  <defs>
    <!-- Luxury Tech Gradients -->
    <linearGradient id="bodyGradFigma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#2A2A2A" stopOpacity="1"/>
      <stop offset="50%" stopColor="#111111" stopOpacity="1"/>
      <stop offset="100%" stopColor="#000000" stopOpacity="1"/>
    </linearGradient>
    <linearGradient id="redGradFigma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#FF1E27" stopOpacity="1"/>
      <stop offset="50%" stopColor="#B3000C" stopOpacity="1"/>
      <stop offset="100%" stopColor="#5E0000" stopOpacity="1"/>
    </linearGradient>
    <linearGradient id="chromeFigma" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#FFFFFF" stopOpacity="1"/>
      <stop offset="50%" stopColor="#A0A0A0" stopOpacity="1"/>
      <stop offset="100%" stopColor="#404040" stopOpacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#0a0a0a"/>

  <!-- 1. Aero Wings (Background) -->
  <!-- Left Wing -->
  <path d="M150,150 L10,80 L0,110 L130,180 Z" fill="#2A2A2A"/>
  <path d="M140,185 L30,140 L20,165 L145,215 Z" fill="#2A2A2A"/>
  <path d="M145,225 L60,195 L50,215 L150,250 Z" fill="#2A2A2A"/>
  
  <!-- Left Accent Glow (Red) -->
  <path d="M130,180 L0,110 L15,130 L140,195 Z" fill="#FF1E27"/>
  <path d="M145,215 L20,165 L30,180 L145,225 Z" fill="#B3000C"/>

  <!-- Right Wing -->
  <path d="M250,150 L390,80 L400,110 L270,180 Z" fill="#2A2A2A"/>
  <path d="M260,185 L370,140 L380,165 L255,215 Z" fill="#2A2A2A"/>
  <path d="M255,225 L340,195 L350,215 L250,250 Z" fill="#2A2A2A"/>
  
  <!-- Right Accent Glow (Red) -->
  <path d="M270,180 L400,110 L385,130 L260,195 Z" fill="#FF1E27"/>
  <path d="M255,215 L380,165 L370,180 L255,225 Z" fill="#B3000C"/>

  <!-- 2. Embedded Tech Spinner / Arc Core (Midground) -->
  <g transform="translate(200, 200)">
    <!-- Outer Tech Housing -->
    <circle cx="0" cy="0" r="55" fill="#030303" stroke="#A0A0A0" stroke-width="2"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#1a1a1a" stroke-width="6"/>

    <!-- The Rotor Blades -->
    <path transform="rotate(0)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#FF1E27"/>
    <path transform="rotate(45)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#B3000C"/>
    <path transform="rotate(90)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#FF1E27"/>
    <path transform="rotate(135)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#B3000C"/>
    <path transform="rotate(180)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#FF1E27"/>
    <path transform="rotate(225)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#B3000C"/>
    <path transform="rotate(270)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#FF1E27"/>
    <path transform="rotate(315)" d="M-6,-45 L6,-45 L10,-20 L-10,-20 Z" fill="#B3000C"/>
    
    <!-- Core glowing ring -->
    <circle cx="0" cy="0" r="28" fill="#111111" stroke="#FF1E27" stroke-width="4"/>
    
    <!-- Central Mount -->
    <circle cx="0" cy="0" r="14" fill="#A0A0A0"/>
    <circle cx="0" cy="0" r="6" fill="#000000"/>
  </g>

  <!-- 3. Skeleton Piston (Foreground) - Wraps around the core -->
  <!-- Piston Head -->
  <path d="M140,50 L260,50 L260,85 L240,110 L160,110 L140,85 Z" fill="#111111"/>
  <path d="M140,50 L260,50 L260,60 L140,60 Z" fill="#A0A0A0"/>
  
  <!-- Chrome Details -->
  <rect x="145" y="68" width="110" height="3" fill="#A0A0A0"/>
  <rect x="150" y="78" width="100" height="3" fill="#A0A0A0"/>
  <rect x="155" y="88" width="90" height="3" fill="#FF1E27"/>

  <!-- Left Rail / Shaft -->
  <rect x="165" y="110" width="15" height="190" fill="#2A2A2A"/>
  <rect x="177" y="110" width="3" height="190" fill="#A0A0A0"/>
  
  <!-- Right Rail / Shaft -->
  <rect x="220" y="110" width="15" height="190" fill="#2A2A2A"/>
  <rect x="220" y="110" width="3" height="190" fill="#A0A0A0"/>

  <!-- Piston Base Connector -->
  <path d="M150,290 L250,290 L260,330 L230,360 L170,360 L140,330 Z" fill="#111111"/>
  <circle cx="200" cy="325" r="22" fill="#A0A0A0"/>
  <circle cx="200" cy="325" r="14" fill="#000000"/>

  <!-- Typography -->
  <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="36" fill="#A0A0A0" letter-spacing="2">
    DOWN SHIFT
  </text>
  <text x="200" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#FF1E27" letter-spacing="3">
    PERFORMANCE PARTS
  </text>
</svg>