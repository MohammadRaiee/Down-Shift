<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <style>
    .spin-elegant {
      transform-origin: 300px 300px;
      animation: spin-soft 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .pump-elegant {
      animation: pump-smooth 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin-soft {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(180deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pump-smooth {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-45px); }
    }
  </style>

  <defs>
    <linearGradient id="silver-anim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9FAFB" />
      <stop offset="50%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>
    <linearGradient id="red-anim" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#991B1B" />
      <stop offset="50%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#FCA5A5" />
    </linearGradient>

    <g id="loader-gear-tooth">
      <path d="M 285 45 L 315 45 C 320 45 325 35 325 30 L 320 10 L 280 10 L 275 30 C 275 35 280 45 285 45 Z" fill="url(#silver-anim)" />
      <circle cx="300" cy="25" r="4" fill="#111" />
    </g>
  </defs>

  <g class="spin-elegant">
    <circle cx="300" cy="300" r="240" fill="none" stroke="url(#red-anim)" stroke-width="12" stroke-dasharray="100 25.6" stroke-linecap="round" opacity="0.9" />
    <circle cx="300" cy="300" r="260" fill="none" stroke="url(#silver-anim)" stroke-width="6" opacity="0.5" />
    <circle cx="300" cy="300" r="200" fill="none" stroke="url(#silver-anim)" stroke-width="2" />
    
    <g>
      <use href="#loader-gear-tooth" transform="rotate(0 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(45 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(90 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(135 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(180 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(225 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(270 300 300)" />
      <use href="#loader-gear-tooth" transform="rotate(315 300 300)" />
    </g>
  </g>

  <g class="pump-elegant">
    <path d="M 220 180 L 380 180 C 390 180 400 190 400 200 L 400 290 L 200 290 L 200 200 C 200 190 210 180 220 180 Z" fill="#0A0A0A" stroke="url(#silver-anim)" stroke-width="10" stroke-linejoin="round" />
    
    <line x1="200" y1="220" x2="400" y2="220" stroke="url(#red-anim)" stroke-width="6" />
    <line x1="200" y1="245" x2="400" y2="245" stroke="url(#silver-anim)" stroke-width="6" />
    
    <circle cx="300" cy="270" r="12" fill="url(#silver-anim)" />
    
    <path d="M 285 290 L 315 290 L 325 430 L 275 430 Z" fill="url(#silver-anim)" />
    <path d="M 292 290 L 308 290 L 315 425 L 285 425 Z" fill="#0A0A0A" opacity="0.4" />
    
    <rect x="250" y="430" width="100" height="40" rx="20" fill="#0A0A0A" stroke="url(#silver-anim)" stroke-width="10" />
    <circle cx="300" cy="450" r="16" fill="none" stroke="url(#red-anim)" stroke-width="6" />
  </g>
</svg>