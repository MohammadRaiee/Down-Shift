<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="platinum" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#D1D5DB" />
      <stop offset="60%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>
    <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F87171" />
      <stop offset="40%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#7F1D1D" />
    </linearGradient>

    <g id="abstract-tooth">
      <path d="M -15 -280 L 15 -280 L 25 -320 L -25 -320 Z" fill="url(#platinum)" />
      <rect x="-5" y="-310" width="10" height="20" fill="url(#crimson)" />
    </g>
  </defs>

  <g transform="translate(400, 400)">
    <g transform="rotate(15)">
      <circle cx="0" cy="0" r="275" fill="none" stroke="url(#platinum)" stroke-width="8" opacity="0.3" />
      <circle cx="0" cy="0" r="240" fill="none" stroke="url(#crimson)" stroke-width="2" />
      
      <g>
        <use href="#abstract-tooth" transform="rotate(0)" />
        <use href="#abstract-tooth" transform="rotate(30)" />
        <use href="#abstract-tooth" transform="rotate(60)" />
        <use href="#abstract-tooth" transform="rotate(90)" />
        <use href="#abstract-tooth" transform="rotate(120)" />
        <use href="#abstract-tooth" transform="rotate(150)" />
        <use href="#abstract-tooth" transform="rotate(180)" />
        <use href="#abstract-tooth" transform="rotate(210)" />
        <use href="#abstract-tooth" transform="rotate(240)" />
        <use href="#abstract-tooth" transform="rotate(270)" />
        <use href="#abstract-tooth" transform="rotate(300)" />
        <use href="#abstract-tooth" transform="rotate(330)" />
      </g>
      <circle cx="0" cy="0" r="280" fill="none" stroke="url(#platinum)" stroke-width="12" />
      <circle cx="0" cy="0" r="255" fill="none" stroke="url(#platinum)" stroke-width="4" stroke-dasharray="20 10" />
    </g>

    <g transform="rotate(35)">
      <path d="M -100 -200 L 100 -200 C 110 -200 120 -190 120 -180 L 120 40 L -120 40 L -120 -180 C -120 -190 -110 -200 -100 -200 Z" fill="#0A0A0A" stroke="url(#platinum)" stroke-width="14" stroke-linejoin="round" />
      
      <line x1="-120" y1="-140" x2="120" y2="-140" stroke="url(#crimson)" stroke-width="12" />
      <line x1="-120" y1="-100" x2="120" y2="-100" stroke="url(#platinum)" stroke-width="10" />
      <line x1="-120" y1="-60" x2="120" y2="-60" stroke="url(#platinum)" stroke-width="10" />

      <circle cx="0" cy="-10" r="22" fill="none" stroke="url(#crimson)" stroke-width="8" />
      
      <path d="M -30 40 L 30 40 L 45 180 L -45 180 Z" fill="url(#platinum)" />
      <path d="M -15 40 L 15 40 L 25 170 L -25 170 Z" fill="#0A0A0A" opacity="0.6" />

      <rect x="-70" y="180" width="140" height="50" rx="25" fill="#0A0A0A" stroke="url(#platinum)" stroke-width="14" />
      <circle cx="0" cy="205" r="14" fill="url(#crimson)" />
    </g>

    <path d="M -350 0 L -280 -70" stroke="url(#platinum)" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M 350 0 L 280 70" stroke="url(#platinum)" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>