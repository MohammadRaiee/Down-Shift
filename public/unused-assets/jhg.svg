<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Colors -->
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c0b11" />
      <stop offset="100%" stop-color="#3c0b11" />
    </linearGradient>
    <polyline id="gearTooth" points="390,-115 410,-115 415,-95 385,-95" fill="#f0303c" />
    
    <g id="gear">
      <circle cx="400" cy="320" r="95" fill="none" stroke="#f0303c" stroke-width="25" />
      <!-- Teeth -->
      <use href="#gearTooth" transform="rotate(0, 400, 320)" />
      <use href="#gearTooth" transform="rotate(15, 400, 320)" />
      <use href="#gearTooth" transform="rotate(30, 400, 320)" />
      <use href="#gearTooth" transform="rotate(45, 400, 320)" />
      <use href="#gearTooth" transform="rotate(60, 400, 320)" />
      <use href="#gearTooth" transform="rotate(75, 400, 320)" />
      <use href="#gearTooth" transform="rotate(90, 400, 320)" />
      <use href="#gearTooth" transform="rotate(105, 400, 320)" />
      <use href="#gearTooth" transform="rotate(120, 400, 320)" />
      <use href="#gearTooth" transform="rotate(135, 400, 320)" />
      <use href="#gearTooth" transform="rotate(150, 400, 320)" />
      <use href="#gearTooth" transform="rotate(165, 400, 320)" />
      <use href="#gearTooth" transform="rotate(180, 400, 320)" />
      <use href="#gearTooth" transform="rotate(195, 400, 320)" />
      <use href="#gearTooth" transform="rotate(210, 400, 320)" />
      <use href="#gearTooth" transform="rotate(225, 400, 320)" />
      <use href="#gearTooth" transform="rotate(240, 400, 320)" />
      <use href="#gearTooth" transform="rotate(255, 400, 320)" />
      <use href="#gearTooth" transform="rotate(270, 400, 320)" />
      <use href="#gearTooth" transform="rotate(285, 400, 320)" />
      <use href="#gearTooth" transform="rotate(300, 400, 320)" />
      <use href="#gearTooth" transform="rotate(315, 400, 320)" />
      <use href="#gearTooth" transform="rotate(330, 400, 320)" />
      <use href="#gearTooth" transform="rotate(345, 400, 320)" />
    </g>

    <!-- Right Wing -->
    <g id="half-wing" fill="#3c0b11">
      <path d="M 505,185 L 750,185 L 710,230 L 505,230 Z" />
      <path d="M 505,245 L 690,245 L 650,290 L 515,290 Z" />
      <path d="M 525,305 L 630,305 L 590,350 L 530,350 Z" />
      <path d="M 535,365 L 570,365 L 530,410 L 485,410 Z" />
      <path d="M 450,185 L 505,185 L 505,230 L 470,230 Q 450,230 450,185 Z" />
      
      <!-- Inner circular cutout mask approximation -->
      <path d="M 480,450 C 580,450 630,320 500,185 L 505,185 C 650,330 570,460 480,450 Z" fill="#ffffff" />
    </g>
    
    <!-- Cutout shape over wings -->
    <clipPath id="wingCutout">
      <path d="M 0,0 L 800,0 L 800,600 L 0,600 Z M 400,320 A 130 130 0 1 0 400,319.9 Z" clip-rule="evenodd" />
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Gear layered behind -->
  <use href="#gear" />

  <!-- Wings -->
  <g clip-path="url(#wingCutout)">
    <!-- Right Wing -->
    <path d="M 480,185 L 760,185 L 715,225 L 480,225 Z" fill="#3c0b11"/>
    <path d="M 480,240 L 695,240 L 650,280 L 480,280 Z" fill="#3c0b11"/>
    <path d="M 480,295 L 630,295 L 585,335 L 480,335 Z" fill="#3c0b11"/>
    <path d="M 450,350 L 565,350 L 520,390 L 415,390 Z" fill="#3c0b11"/>
    <path d="M 450,405 L 500,405 L 455,445 L 390,445 Z" fill="#3c0b11"/>
    
    <!-- Left Wing -->
    <path d="M 320,185 L 40,185 L 85,225 L 320,225 Z" fill="#3c0b11"/>
    <path d="M 320,240 L 105,240 L 150,280 L 320,280 Z" fill="#3c0b11"/>
    <path d="M 320,295 L 170,295 L 215,335 L 320,335 Z" fill="#3c0b11"/>
    <path d="M 350,350 L 235,350 L 280,390 L 385,390 Z" fill="#3c0b11"/>
    <path d="M 350,405 L 300,405 L 345,445 L 410,445 Z" fill="#3c0b11"/>
  </g>

  <!-- Solid white mask to cut out inner area sharply -->
  <circle cx="400" cy="320" r="145" fill="none" stroke="#ffffff" stroke-width="30" />

  <!-- Engine Piston Body -->
  <g id="piston">
    <!-- Piston Cap -->
    <rect x="310" y="35" width="180" height="20" rx="6" fill="#3c0b11" />
    <path d="M 310,65 L 490,65 L 490,215 L 310,215 Z" fill="#3c0b11" />
    <!-- White Cutouts on cap -->
    <path d="M 315,65 L 325,65 L 325,190 L 315,190 Z" fill="#ffffff" />
    <path d="M 475,65 L 485,65 L 485,190 L 475,190 Z" fill="#ffffff" />
    <path d="M 355,80 L 365,80 L 365,160 L 355,160 Z" fill="#f7e1e4" />
    <path d="M 435,80 L 445,80 L 445,160 L 435,160 Z" fill="#f7e1e4" />
    <path d="M 325,95 L 345,95 L 345,215 L 325,215 Z" fill="#ffffff" />
    <path d="M 455,95 L 475,95 L 475,215 L 455,215 Z" fill="#ffffff" />

    <!-- Center Cutout Curve on Piston Cap -->
    <path d="M 330,225 C 330,150 470,150 470,225" fill="#ffffff" />
    <circle cx="400" cy="125" r="18" fill="#ffffff" />

    <!-- Piston Rod -->
    <rect x="375" y="150" width="50" height="280" fill="#3c0b11" />
    <rect x="393" y="170" width="14" height="255" fill="#f7e1e4" />

    <!-- Piston Bottom Bearing -->
    <g transform="translate(0, 480)">
      <!-- Outer Shape -->
      <path d="M 345,-50 L 455,-50 L 455,-35 L 465,-35 L 465,40 L 455,40 L 455,55 L 345,55 L 345,40 L 335,40 L 335,-35 L 345,-35 Z" fill="#3c0b11" stroke="#ffffff" stroke-width="5" />
      <path d="M 350,-45 L 450,-45 L 450,-35 L 460,-35 L 460,35 L 450,35 L 450,50 L 350,50 L 350,35 L 340,35 L 340,-35 L 350,-35 Z" fill="#3c0b11" />
      <!-- Inner Shape and Rings -->
      <circle cx="400" cy="0" r="45" fill="#3c0b11" />
      <circle cx="400" cy="0" r="35" fill="none" stroke="#f7e1e4" stroke-width="4" />
      <circle cx="400" cy="0" r="25" fill="#ffffff" />
      <rect x="343" y="-30" width="5" height="60" fill="#f7e1e4" />
      <rect x="452" y="-30" width="5" height="60" fill="#f7e1e4" />
      <line x1="335" y1="0" x2="345" y2="0" stroke="#ffffff" stroke-width="2" />
      <line x1="455" y1="0" x2="465" y2="0" stroke="#ffffff" stroke-width="2" />
    </g>
  </g>
</svg>