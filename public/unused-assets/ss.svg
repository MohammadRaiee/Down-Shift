<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <linearGradient id="luxSilver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#E2E8F0" />
      <stop offset="70%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>
    <linearGradient id="luxRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F1D1D" />
      <stop offset="50%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#FF6B6B" />
    </linearGradient>
    <linearGradient id="darkMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <g id="elegant-tooth">
      <path d="M 475 120 L 525 120 L 515 180 L 485 180 Z" fill="url(#luxSilver)" />
      <path d="M 485 120 L 490 180 L 500 180 Z" fill="#FFFFFF" opacity="0.5" />
    </g>
    
    <g id="gear-crest">
      <circle cx="500" cy="500" r="300" fill="url(#darkMetal)" stroke="url(#luxSilver)" stroke-width="12" />
      <circle cx="500" cy="500" r="275" fill="none" stroke="url(#luxRed)" stroke-width="16" filter="url(#glow)" />
      <circle cx="500" cy="500" r="230" fill="none" stroke="url(#luxSilver)" stroke-width="4" />
      
      <use href="#elegant-tooth" transform="rotate(0 500 500)" />
      <use href="#elegant-tooth" transform="rotate(22.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(45 500 500)" />
      <use href="#elegant-tooth" transform="rotate(67.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(90 500 500)" />
      <use href="#elegant-tooth" transform="rotate(112.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(135 500 500)" />
      <use href="#elegant-tooth" transform="rotate(157.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(180 500 500)" />
      <use href="#elegant-tooth" transform="rotate(202.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(225 500 500)" />
      <use href="#elegant-tooth" transform="rotate(247.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(270 500 500)" />
      <use href="#elegant-tooth" transform="rotate(292.5 500 500)" />
      <use href="#elegant-tooth" transform="rotate(315 500 500)" />
      <use href="#elegant-tooth" transform="rotate(337.5 500 500)" />
    </g>
  </defs>

  <use href="#gear-crest" />

  <g id="shield-wings">
    <path d="M 220 500 C 220 300 350 220 500 150 C 650 220 780 300 780 500 C 780 680 650 780 500 850 C 350 780 220 680 220 500 Z" fill="none" stroke="url(#luxRed)" stroke-width="4" opacity="0.6" />
    <path d="M 250 500 C 250 330 360 260 500 200 C 640 260 750 330 750 500 C 750 650 640 740 500 800 C 360 740 250 650 250 500 Z" fill="none" stroke="url(#luxSilver)" stroke-width="8" />
  </g>

  <g id="premuim-piston">
    <path d="M 380 250 L 620 250 C 640 250 650 260 650 280 L 650 480 C 650 500 640 510 620 510 L 380 510 C 360 510 350 500 350 480 L 350 280 C 350 260 360 250 380 250 Z" fill="url(#darkMetal)" stroke="url(#luxSilver)" stroke-width="12" stroke-linejoin="round" />
    
    <rect x="350" y="300" width="300" height="15" fill="url(#luxRed)" />
    <rect x="350" y="340" width="300" height="15" fill="url(#luxRed)" />
    <rect x="350" y="380" width="300" height="15" fill="url(#luxSilver)" />
    
    <circle cx="500" cy="450" r="35" fill="url(#darkMetal)" stroke="url(#luxSilver)" stroke-width="10" />
    <circle cx="500" cy="450" r="15" fill="url(#luxRed)" />

    <path d="M 460 510 L 440 680 A 10 10 0 0 0 450 690 L 550 690 A 10 10 0 0 0 560 680 L 540 510 Z" fill="url(#luxSilver)" stroke="#111827" stroke-width="6" stroke-linejoin="round" />
    <path d="M 480 510 L 470 670 L 530 670 L 520 510 Z" fill="url(#darkMetal)" opacity="0.8" />

    <rect x="390" y="690" width="220" height="80" rx="40" fill="url(#darkMetal)" stroke="url(#luxSilver)" stroke-width="12" />
    <circle cx="500" cy="730" r="50" fill="none" stroke="url(#luxRed)" stroke-width="10" />
    <circle cx="500" cy="730" r="20" fill="url(#luxSilver)" />
    
    <circle cx="430" cy="730" r="12" fill="url(#luxSilver)" />
    <circle cx="570" cy="730" r="12" fill="url(#luxSilver)" />
  </g>
</svg>