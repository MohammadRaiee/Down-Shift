<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="25%" stop-color="#A5B0C0"/>
      <stop offset="50%" stop-color="#E2E8F0"/>
      <stop offset="75%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>

    <linearGradient id="chromeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>

    <linearGradient id="darkMetal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="crimson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3333"/>
      <stop offset="30%" stop-color="#D90000"/>
      <stop offset="70%" stop-color="#800000"/>
      <stop offset="100%" stop-color="#330000"/>
    </linearGradient>

    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4D4D"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A0505"/>
      <stop offset="70%" stop-color="#0A0505"/>
      <stop offset="100%" stop-color="#030303"/>
    </radialGradient>

    <mask id="hollowCenter">
      <rect x="0" y="0" width="800" height="600" fill="white"/>
      <circle cx="400" cy="300" r="95" fill="black"/>
    </mask>

    <g id="wingBlade">
      <!-- Aerodynamic layering to look like metallic feathers/blades -->
      <!-- Blade 1 (Top) -->
      <path d="M 290,190 C 180,120 70,100 10,70 C 80,110 170,160 280,230 Z" fill="url(#chrome)"/>
      <path d="M 290,195 C 185,135 80,120 30,95 C 90,125 175,170 280,230 Z" fill="url(#darkMetal)"/>
      <path d="M 290,195 C 185,135 80,120 30,95 C 70,115 150,150 250,210 Z" fill="url(#crimson)" opacity="0.8"/>
      
      <!-- Blade 2 -->
      <path d="M 285,225 C 190,175 90,165 20,150 C 85,180 170,210 270,265 Z" fill="url(#chrome)"/>
      <path d="M 285,230 C 195,185 100,180 40,170 C 95,195 175,220 270,265 Z" fill="url(#darkMetal)"/>
      <path d="M 285,230 C 195,185 100,180 40,170 C 80,190 150,210 240,245 Z" fill="url(#crimson)" opacity="0.6"/>

      <!-- Blade 3 -->
      <path d="M 280,260 C 195,225 100,225 40,225 C 95,245 170,260 260,300 Z" fill="url(#chrome)"/>
      <path d="M 280,265 C 200,235 110,240 60,245 C 105,260 175,270 260,300 Z" fill="url(#darkMetal)"/>

      <!-- Blade 4 -->
      <path d="M 270,295 C 190,270 110,285 60,300 C 110,310 170,310 250,335 Z" fill="url(#chrome)"/>
      <path d="M 270,300 C 195,280 120,295 80,315 C 120,320 175,320 250,335 Z" fill="url(#darkMetal)"/>

      <!-- Blade 5 (Bottom) -->
      <path d="M 260,330 C 190,315 120,340 80,370 C 120,365 170,360 240,370 Z" fill="url(#chrome)"/>
      <path d="M 260,335 C 195,325 130,350 100,380 C 130,370 175,365 240,370 Z" fill="url(#darkMetal)"/>
      
      <!-- Base connecting structure overlapping -->
      <path d="M 290,190 C 270,250 260,300 240,370 C 265,340 285,280 295,230 Z" fill="url(#darkMetal)"/>
      <path d="M 291,190 C 275,245 265,295 242,365 C 266,335 287,275 295,230 Z" fill="url(#chromeHighlight)"/>
    </g>

    <g id="gearTeeth">
      <rect x="382" y="135" width="36" height="330" rx="6" fill="url(#crimson)"/>
      <rect x="382" y="135" width="36" height="330" rx="6" transform="rotate(30 400 300)" fill="url(#crimson)"/>
      <rect x="382" y="135" width="36" height="330" rx="6" transform="rotate(60 400 300)" fill="url(#crimson)"/>
      <rect x="382" y="135" width="36" height="330" rx="6" transform="rotate(90 400 300)" fill="url(#crimson)"/>
      <rect x="382" y="135" width="36" height="330" rx="6" transform="rotate(120 400 300)" fill="url(#crimson)"/>
      <rect x="382" y="135" width="36" height="330" rx="6" transform="rotate(150 400 300)" fill="url(#crimson)"/>
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="600" fill="#030303" />
  <rect x="0" y="0" width="800" height="600" fill="url(#bgGlow)" />

  <!-- Side Wings -->
  <use href="#wingBlade" />
  <use href="#wingBlade" transform="translate(800, 0) scale(-1, 1)" />

  <!-- Center Gear Structure -->
  <g mask="url(#hollowCenter)">
    <use href="#gearTeeth" />
    <circle cx="400" cy="300" r="142" fill="url(#crimson)" stroke="url(#redAccent)" stroke-width="6" />
    <circle cx="400" cy="300" r="110" fill="none" stroke="url(#chromeHighlight)" stroke-width="3" />
  </g>

  <!-- Inner Rings -->
  <circle cx="400" cy="300" r="95" fill="none" stroke="url(#redAccent)" stroke-width="5"/>
  <circle cx="400" cy="300" r="89" fill="none" stroke="url(#chrome)" stroke-width="1.5"/>
  <circle cx="400" cy="300" r="85" fill="none" stroke="#000000" stroke-width="6"/>

  <!-- Piston Structure -->
  <g id="pistonGroup">
    <rect x="376" y="200" width="48" height="260" fill="url(#darkMetal)" />
    <rect x="386" y="200" width="28" height="260" fill="url(#chrome)" />
    
    <!-- Piston Head -->
    <path d="M 330,225 L 470,225 L 470,140 Q 400,105 330,140 Z" fill="url(#chrome)" />
    <path d="M 335,225 L 465,225 L 465,142 Q 400,112 335,142 Z" fill="url(#darkMetal)" />
    
    <!-- Piston Rings -->
    <rect x="325" y="150" width="150" height="5" rx="2" fill="url(#chromeHighlight)" />
    <rect x="325" y="165" width="150" height="5" rx="2" fill="url(#chromeHighlight)" />
    <rect x="325" y="180" width="150" height="5" rx="2" fill="url(#chromeHighlight)" />
    <rect x="325" y="195" width="150" height="5" rx="2" fill="url(#chromeHighlight)" />
    
    <!-- Gudgeon Pin -->
    <circle cx="400" cy="180" r="20" fill="url(#darkMetal)" />
    <circle cx="400" cy="180" r="14" fill="#0A0A0A" />
    <circle cx="400" cy="180" r="9" fill="url(#chrome)" />

    <!-- Connecting Rod Bottom -->
    <path d="M 340,460 Q 330,535 400,535 Q 470,535 460,460 Z" fill="url(#chrome)" />
    <path d="M 346,462 Q 338,527 400,527 Q 462,527 454,462 Z" fill="url(#darkMetal)" />
    
    <!-- Caps/Screws area -->
    <rect x="330" y="440" width="140" height="24" rx="4" fill="url(#darkMetal)" />
    <rect x="335" y="444" width="130" height="16" rx="3" fill="url(#chrome)" />

    <!-- Bottom Hole -->
    <circle cx="400" cy="490" r="30" fill="#030303" stroke="url(#chromeHighlight)" stroke-width="4"/>
    <circle cx="400" cy="490" r="37" fill="none" stroke="url(#darkMetal)" stroke-width="2"/>
    
    <!-- Screws -->
    <circle cx="355" cy="452" r="5" fill="#030303" />
    <circle cx="445" cy="452" r="5" fill="#030303" />
  </g>
  
  <!-- Subtle Red Highlights -->
  <circle cx="400" cy="95" r="4" fill="url(#redAccent)" />
  <circle cx="400" cy="550" r="4" fill="url(#chromeHighlight)" />
</svg>