<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#D0D5DB"/>
      <stop offset="80%" stop-color="#80858B"/>
      <stop offset="100%" stop-color="#50555A"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF2A2A"/>
      <stop offset="50%" stop-color="#D40000"/>
      <stop offset="100%" stop-color="#7A0000"/>
    </linearGradient>
    <linearGradient id="darkMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="50%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <g id="wing">
      <polygon points="460,180 760,180 720,230 460,230" fill="url(#silver)"/>
      <polygon points="455,245 705,245 665,295 450,295" fill="url(#darkMetal)" stroke="url(#silver)" stroke-width="2.5"/>
      <polygon points="445,310 650,310 610,360 440,360" fill="url(#redGlow)"/>
      <polygon points="435,375 595,375 555,425 430,425" fill="url(#silver)"/>
    </g>
  </defs>
  <rect width="100%" height="100%" fill="#0B0B0D"/>
  <circle cx="400" cy="310" r="160" fill="none" stroke="url(#redGlow)" stroke-width="32" stroke-dasharray="28 16" filter="url(#glow)"/>
  <circle cx="400" cy="310" r="200" fill="none" stroke="url(#silver)" stroke-width="18" stroke-dasharray="35 25"/>
  <circle cx="400" cy="310" r="130" fill="url(#darkMetal)" stroke="url(#silver)" stroke-width="5"/>
  <use href="#wing" transform="scale(-1, 1) translate(-800, 0)" />
  <use href="#wing" />
  <g filter="url(#glow)">
    <rect x="370" y="160" width="60" height="290" fill="url(#silver)" rx="8"/>
    <rect x="382" y="160" width="12" height="290" fill="#FFFFFF" opacity="0.6"/>
    <path d="M 320,165 L 480,165 L 480,105 Q 480,75 400,75 Q 320,75 320,105 Z" fill="url(#darkMetal)" stroke="url(#silver)" stroke-width="4"/>
    <rect x="310" y="165" width="180" height="22" fill="url(#silver)" rx="6"/>
    <rect x="325" y="125" width="150" height="12" fill="url(#redGlow)" rx="3"/>
    <rect x="335" y="100" width="130" height="12" fill="url(#redGlow)" rx="3"/>
    <circle cx="400" cy="118" r="20" fill="url(#silver)"/>
    <circle cx="400" cy="118" r="12" fill="#111"/>
    <rect x="330" y="430" width="140" height="70" fill="url(#darkMetal)" stroke="url(#silver)" stroke-width="4" rx="25"/>
    <rect x="320" y="430" width="160" height="18" fill="url(#silver)" rx="5"/>
    <circle cx="400" cy="465" r="26" fill="url(#silver)"/>
    <circle cx="400" cy="465" r="14" fill="#111"/>
  </g>
</svg>