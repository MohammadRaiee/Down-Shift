<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <style>
    /* Smooth, luxurious easing for the rotation */
    .lux-spin {
      transform-origin: 400px 400px;
      animation: orbit 6s cubic-bezier(0.37, 0, 0.63, 1) infinite;
    }
    
    /* Elegant, heavy mechanical pumping motion */
    .lux-pump {
      animation: heavy-pump 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
    
    @keyframes orbit {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes heavy-pump {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-70px); }
    }
  </style>

  <defs>
    <linearGradient id="loader-metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111317" />
      <stop offset="25%" stop-color="#E2E8F0" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="75%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#111317" />
    </linearGradient>

    <linearGradient id="loader-red" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7F1D1D" />
      <stop offset="30%" stop-color="#DC2626" />
      <stop offset="70%" stop-color="#FF6B6B" />
      <stop offset="100%" stop-color="#450A0A" />
    </linearGradient>

    <!-- Outer gear tooth -->
    <g id="loader-tooth" opacity="0.85">
      <path d="M 385 60 L 415 60 L 420 30 L 380 30 Z" fill="url(#loader-metal)" />
      <path d="M 385 60 L 400 60 L 400 30 L 380 30 Z" fill="#FFF" opacity="0.4" />
    </g>
  </defs>

  <!-- Rotating Gear Frame -->
  <g class="lux-spin">
    <!-- Premium segmented outer ring -->
    <circle cx="400" cy="400" r="320" fill="none" stroke="url(#loader-red)" stroke-width="25" stroke-dasharray="160 41" stroke-linecap="round" />
    <circle cx="400" cy="400" r="290" fill="none" stroke="url(#loader-metal)" stroke-width="4" opacity="0.7" />
    <circle cx="400" cy="400" r="345" fill="none" stroke="url(#loader-metal)" stroke-width="2" opacity="0.4" />

    <use href="#loader-tooth" transform="rotate(0 400 400)" />
    <use href="#loader-tooth" transform="rotate(30 400 400)" />
    <use href="#loader-tooth" transform="rotate(60 400 400)" />
    <use href="#loader-tooth" transform="rotate(90 400 400)" />
    <use href="#loader-tooth" transform="rotate(120 400 400)" />
    <use href="#loader-tooth" transform="rotate(150 400 400)" />
    <use href="#loader-tooth" transform="rotate(180 400 400)" />
    <use href="#loader-tooth" transform="rotate(210 400 400)" />
    <use href="#loader-tooth" transform="rotate(240 400 400)" />
    <use href="#loader-tooth" transform="rotate(270 400 400)" />
    <use href="#loader-tooth" transform="rotate(300 400 400)" />
    <use href="#loader-tooth" transform="rotate(330 400 400)" />
  </g>

  <!-- Animated Center Piston -->
  <g class="lux-pump">
    <!-- Cylinder wall shadow context (static illusion behind piston) -->
    <path d="M 280 200 L 520 200 L 520 700 L 280 700 Z" fill="#000" opacity="0.4" />

    <!-- Piston Head -->
    <path d="M 300 230 C 300 210 350 200 400 200 C 450 200 500 210 500 230 L 500 370 C 500 380 480 400 440 410 C 440 410 420 420 400 420 C 380 420 360 410 360 410 C 320 400 300 380 300 370 Z" fill="url(#loader-metal)" />
    
    <!-- Piston Reflection & Crown -->
    <ellipse cx="400" cy="220" rx="100" ry="15" fill="#111" stroke="url(#loader-metal)" stroke-width="4" />
    <ellipse cx="400" cy="220" rx="98" ry="13" fill="url(#loader-metal)" opacity="0.3" />
    
    <!-- Grooves -->
    <rect x="300" y="250" width="200" height="10" fill="#08090A" />
    <rect x="300" y="275" width="200" height="10" fill="#08090A" />
    <line x1="300" y1="260" x2="500" y2="260" stroke="#FFF" stroke-width="1" opacity="0.5" />
    <line x1="300" y1="285" x2="500" y2="285" stroke="#FFF" stroke-width="1" opacity="0.5" />

    <!-- Pin -->
    <circle cx="400" cy="350" r="28" fill="#08090A" stroke="url(#loader-metal)" stroke-width="3" />
    <circle cx="400" cy="350" r="20" fill="url(#loader-metal)" opacity="0.6" />
    
    <!-- Connecting Rod Base -->
    <path d="M 370 380 L 430 380 L 445 560 L 355 560 Z" fill="url(#loader-metal)" />
    <path d="M 383 390 L 417 390 L 427 550 L 373 550 Z" fill="#08090A" />
    
    <!-- End Cap -->
    <path d="M 330 560 L 470 560 C 490 560 490 580 490 600 C 490 630 450 650 400 650 C 350 650 310 630 310 600 C 310 580 310 560 330 560 Z" fill="url(#loader-metal)" />
    <circle cx="400" cy="600" r="35" fill="#08090A" stroke="url(#loader-metal)" stroke-width="6" />
  </g>
</svg>