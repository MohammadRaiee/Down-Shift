<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="metal" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#A5A9AD" />
      <stop offset="60%" stop-color="#808488" />
      <stop offset="100%" stop-color="#4B4E52" />
    </linearGradient>

    <linearGradient id="darkMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#666A6E" />
      <stop offset="100%" stop-color="#2A2D30" />
    </linearGradient>

    <linearGradient id="redGear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="50%" stop-color="#D60000" />
      <stop offset="100%" stop-color="#8A0000" />
    </linearGradient>

    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1A1A" />
      <stop offset="100%" stop-color="#B30000" />
    </linearGradient>

    <mask id="gearMask">
      <rect x="0" y="0" width="800" height="600" fill="white" />
      <circle cx="400" cy="300" r="85" fill="black" />
    </mask>

    <mask id="pistonMask">
      <rect x="0" y="0" width="800" height="600" fill="white" />
      <circle cx="400" cy="180" r="24" fill="black" />
      <rect x="320" y="130" width="160" height="8" fill="black" />
      <rect x="320" y="150" width="160" height="8" fill="black" />
      <rect x="320" y="170" width="160" height="8" fill="black" />
      <circle cx="400" cy="460" r="32" fill="black" />
      <circle cx="360" cy="495" r="7" fill="black" />
      <circle cx="440" cy="495" r="7" fill="black" />
    </mask>

    <g id="wing">
      <polygon points="260,165 40,110 80,160 270,205" fill="url(#darkMetal)" />
      <polygon points="260,165 50,120 80,160 265,195" fill="url(#metal)" />
      
      <polygon points="275,230 20,185 60,240 285,270" fill="url(#darkMetal)" />
      <polygon points="275,230 30,195 60,240 280,260" fill="url(#metal)" />

      <polygon points="285,295 30,265 65,315 285,330" fill="url(#darkMetal)" />
      <polygon points="285,295 40,275 65,315 280,320" fill="url(#metal)" />

      <polygon points="280,355 60,335 90,380 265,390" fill="url(#darkMetal)" />
      <polygon points="280,355 70,345 90,380 260,380" fill="url(#metal)" />

      <polygon points="250,410 110,400 130,440 220,440" fill="url(#darkMetal)" />
      <polygon points="250,410 120,408 130,440 215,432" fill="url(#metal)" />
      
      <polygon points="270,205 80,160 85,165 272,210" fill="url(#redAccent)" />
      <polygon points="285,270 60,240 65,245 287,275" fill="url(#redAccent)" />
      <polygon points="285,330 65,315 70,320 286,335" fill="url(#redAccent)" />
      <polygon points="265,390 90,380 95,385 264,395" fill="url(#redAccent)" />
    </g>
  </defs>

  <use href="#wing" />
  <use href="#wing" transform="translate(800, 0) scale(-1, 1)" />

  <g mask="url(#gearMask)" fill="url(#redGear)">
    <circle cx="400" cy="300" r="145" />
    <rect x="375" y="130" width="50" height="340" rx="4" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(20 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(40 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(60 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(80 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(100 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(120 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(140 400 300)" />
    <rect x="375" y="130" width="50" height="340" rx="4" transform="rotate(160 400 300)" />
  </g>

  <g mask="url(#pistonMask)">
    <path d="M 340,95 Q 400,80 460,95 L 475,115 L 475,220 L 325,220 L 325,115 Z" fill="url(#metal)" />
    <rect x="375" y="215" width="50" height="235" fill="url(#darkMetal)" />
    <rect x="382" y="215" width="10" height="235" fill="url(#metal)" />
    <rect x="408" y="215" width="10" height="235" fill="url(#metal)" />

    <circle cx="400" cy="460" r="55" fill="url(#metal)" />
    <path d="M 345,460 L 455,460 Q 455,510 445,510 L 355,510 Q 345,510 345,460 Z" fill="url(#darkMetal)" />
    <path d="M 348,460 L 452,460 Q 452,504 442,504 L 358,504 Q 348,504 348,460 Z" fill="url(#metal)" />
  </g>

  <circle cx="400" cy="92" r="5" fill="url(#redGear)" />
</svg>