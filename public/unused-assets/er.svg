<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <!-- Core Colors from the image -->
    <style>
      .dark { fill: #2B0A0F; }
      .red { fill: #F12E3C; }
      .light { fill: #FDE8EA; }
      .bg { fill: none; }
    </style>

    <!-- Center Red Gear -->
    <g id="red-gear">
      <circle cx="500" cy="530" r="135" class="bg" stroke="#F12E3C" stroke-width="35" />
      <g fill="#F12E3C">
        <!-- Gear Teeth -->
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(0, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(20, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(40, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(60, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(80, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(100, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(120, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(140, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(160, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(180, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(200, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(220, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(240, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(260, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(280, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(300, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(320, 500, 530)" />
        <path d="M 485 350 L 515 350 L 520 380 L 480 380 Z" transform="rotate(340, 500, 530)" />
      </g>
    </g>

    <g id="wing">
      <!-- Main wing base -->
      <path d="M 45 300 
               L 362 300 
               C 362 300, 362 370, 350 400
               L 300 400 L 300 480 L 350 480
               C 350 510, 350 580, 362 760
               L 210 760 
               Z" class="dark" />
      
      <!-- Overriding the wing shape with an exact polygon-based construction for the striped segments -->
      <polygon points="45,300 362,300 362,375 80,375" class="dark" />
      <polygon points="80,400 345,400 320,443 320,455 350,455 350,475 115,475" class="dark" />
      <polygon points="115,502 355,502 365,540 350,551 345,577 155,577" class="dark" />
      <polygon points="155,605 330,605 350,622 340,650 320,680 190,680" class="dark" />
      <polygon points="190,705 310,705 280,740 275,760 215,760" class="dark" />

      <!-- Inner gear profile for the wing -->
      <path d="M 362 300 L 298 300 C 330 350, 350 430, 350 530 C 350 630, 320 700, 275 760 L 400 760 C 450 650, 480 500, 480 400 Z" fill="#FFFFFF" />
      
      <!-- True Wing Segment Left -->
      <path class="dark" d="M 45,300 L 362,300 L 362,375 L 80,375 Z" />
      <path class="dark" d="M 80,400 L 340,400 L 330,420 L 350,420 L 350,455 L 310,455 L 310,475 L 115,475 Z" />
      <path class="dark" d="M 115,502 L 296,502 L 305,522 L 325,522 L 325,550 L 345,550 L 345,577 L 155,577 Z" />
      <path class="dark" d="M 155,605 L 355,605 L 355,622 L 315,622 L 315,650 L 335,650 L 320,680 L 190,680 Z" />
      <path class="dark" d="M 190,705 L 300,705 L 290,730 L 315,730 L 300,760 L 210,760 Z" />

      <!-- Clean Inner Cut for Wing -->
      <circle cx="500" cy="530" r="185" fill="none" stroke="#FFFFFF" stroke-width="40" />
      
      <!-- Inner Wing Gear Teeth (Facing into the circle) -->
      <polygon points="305,400 325,400 320,430 300,430" class="dark" transform="rotate(30, 500, 530)" />
      <polygon points="295,450 320,450 315,480 295,480" class="dark" transform="rotate(45, 500, 530)" />
      <!-- Approximate wing inner teeth -->
      <path d="M 330 405 L 365 405 L 365 435 L 315 435 Z" class="dark" />
      <path d="M 315 455 L 350 455 L 350 485 L 300 485 Z" class="dark" />
      <path d="M 296 502 L 330 502 L 325 532 L 285 532 Z" class="dark" />
      <path d="M 285 550 L 320 550 L 315 580 L 275 580 Z" class="dark" />
      <path d="M 280 600 L 315 600 L 310 630 L 265 630 Z" class="dark" />
      <path d="M 270 650 L 305 650 L 295 680 L 255 680 Z" class="dark" />
      <path d="M 265 700 L 290 700 L 280 730 L 245 730 Z" class="dark" />
    </g>

    <!-- Precise Wing Component -->
    <g id="precise-wing">
      <polygon points="45,300 361,300 361,375 80,375" class="dark" />
      <polygon points="81,400 299,400 299,425 253,425 253,475 116,475" class="dark" />
      <polygon points="116,500 252,500 252,525 264,525 264,550 277,550 277,575 153,575" class="dark" />
      <polygon points="153,600 278,600 278,625 266,625 266,650 253,650 253,675 188,675" class="dark" />
      <polygon points="188,700 237,700 237,725 204,760 216,760" class="dark" />

      <!-- The inner gear of the wing -->
      <path class="dark" d="M 361 300 C 330 400, 310 470, 310 530 C 310 590, 330 670, 400 760 L 210 760 L 290 680 C 270 630, 260 580, 260 530 C 260 480, 270 420, 290 375 Z" />
      
      <!-- Inner Teeth -->
      <path class="dark" d="M 299 400 L 319 400 L 314 425 L 293 425 Z" />
      <path class="dark" d="M 291 450 L 308 450 L 303 475 L 283 475 Z" />
      <path class="dark" d="M 284 500 L 298 500 L 293 525 L 273 525 Z" />
      <path class="dark" d="M 276 550 L 290 550 L 285 575 L 265 575 Z" />
      <path class="dark" d="M 271 600 L 285 600 L 280 625 L 260 625 Z" />
      <path class="dark" d="M 267 650 L 280 650 L 275 675 L 255 675 Z" />
      <path class="dark" d="M 264 700 L 277 700 L 272 725 L 252 725 Z" />
    </g>

    <g id="clean-wing">
      <!-- Manual polygon tracing of the exact wing structure -->
      <path class="dark" d="M 45 300 L 362 300 L 362 375 L 80 375 Z" />
      <path class="dark" d="M 80 400 L 296 400 L 296 425 L 256 425 L 256 450 L 267 450 L 267 475 L 115 475 Z" />
      <path class="dark" d="M 115 500 L 270 500 L 270 525 L 280 525 L 280 550 L 271 550 L 271 575 L 155 575 Z" />
      <path class="dark" d="M 155 600 L 277 600 L 277 625 L 262 625 L 262 650 L 250 650 L 250 675 L 190 675 Z" />
      <path class="dark" d="M 190 700 L 247 700 L 247 725 L 235 725 L 235 750 L 210 760 L 225 760 Z" />

      <path class="dark" d="M 296 400 L 319 400 L 314 425 L 294 425 Z" />
      <path class="dark" d="M 288 450 L 308 450 L 304 475 L 284 475 Z" />
      <path class="dark" d="M 281 500 L 300 500 L 296 525 L 277 525 Z" />
      <path class="dark" d="M 276 550 L 295 550 L 291 575 L 271 575 Z" />
      <path class="dark" d="M 273 600 L 292 600 L 288 625 L 268 625 Z" />
      <path class="dark" d="M 272 650 L 291 650 L 287 675 L 267 675 Z" />
      <path class="dark" d="M 273 700 L 292 700 L 288 725 L 268 725 Z" />
      <path class="dark" d="M 362 300 C 330 380, 310 450, 310 530 C 310 610, 330 680, 400 760 L 360 760 C 290 680, 270 610, 270 530 C 270 450, 290 380, 362 300 Z" />
    </g>

    <g id="final-wing">
      <polygon class="dark" points="45,300 361,300 361,374 81,374" />
      <polygon class="dark" points="81,400 294,400 294,424 254,424 254,449 265,449 265,474 116,474" />
      <polygon class="dark" points="116,499 268,499 268,524 278,524 278,549 270,549 270,574 153,574" />
      <polygon class="dark" points="153,599 276,599 276,624 262,624 262,649 250,649 250,674 188,674" />
      <polygon class="dark" points="188,700 248,700 248,725 237,725 212,760 223,760" />

      <!-- Gear teeth and connecting arc on wing -->
      <path class="dark" d="M 294 400 L 317 400 L 312 424 L 292 424 Z" />
      <path class="dark" d="M 285 449 L 305 449 L 300 474 L 280 474 Z" />
      <path class="dark" d="M 279 499 L 298 499 L 294 524 L 274 524 Z" />
      <path class="dark" d="M 275 549 L 294 549 L 290 574 L 270 574 Z" />
      <path class="dark" d="M 272 599 L 291 599 L 287 624 L 267 624 Z" />
      <path class="dark" d="M 270 649 L 289 649 L 285 674 L 265 674 Z" />
      <path class="dark" d="M 270 700 L 289 700 L 285 725 L 265 725 Z" />

      <path class="dark" d="M 361 300 C 330 380, 310 450, 310 530 C 310 610, 330 680, 400 760 L 360 760 C 290 680, 270 610, 270 530 C 270 450, 290 380, 361 300 Z" />
    </g>
  </defs>

  <rect width="1000" height="1000" fill="#FFFFFF" />

  <!-- Background Red Gear -->
  <use href="#red-gear" />

  <!-- Left and Right Wings -->
  <use href="#final-wing" />
  <use href="#final-wing" transform="scale(-1, 1) translate(-1000, 0)" />

  <!-- Center Piston -->
  <g id="piston">
    <!-- Top Cap Bar -->
    <rect x="372" y="50" width="256" height="25" rx="3" class="dark" />
    
    <!-- Piston Head Main Body -->
    <path class="dark" d="M 372 80 L 628 80 L 628 355 L 590 355 L 590 280 A 90 90 0 0 0 410 280 L 410 355 L 372 355 Z" />
    <path class="light" d="M 387 88 L 401 88 L 401 270 A 97 97 0 0 1 387 270 Z" />
    <path class="light" d="M 599 88 L 613 88 L 613 270 A 97 97 0 0 0 599 270 Z" />
    <path class="light" d="M 416 88 L 430 88 L 430 250 A 88 88 0 0 1 416 265 Z" />
    <path class="light" d="M 570 88 L 584 88 L 584 265 A 88 88 0 0 1 570 250 Z" />
    
    <!-- Piston Head Circle Detail -->
    <circle cx="500" cy="200" r="23" class="light" />
    
    <!-- Piston Head Dark/Light Vertical Striping Refinement -->
    <path class="dark" d="M 372 80 L 628 80 L 628 355 L 587 355 L 587 283 C 587 235, 548 196, 500 196 C 452 196, 413 235, 413 283 L 413 355 L 372 355 Z" />
    
    <!-- Precise vertical light bars tracing -->
    <rect x="388" y="165" width="13" height="150" class="light" />
    <rect x="599" y="165" width="13" height="150" class="light" />
    
    <path class="light" d="M 388 165 L 401 165 L 416 110 L 403 110 Z" />
    <path class="light" d="M 599 165 L 612 165 L 597 110 L 584 110 Z" />
    <path class="light" d="M 388 165 L 430 165 L 430 110 C 420 120, 410 130, 403 110 Z" fill="none" />

    <!-- Remake Piston Head with exact structures matching the image -->
    <g id="piston-head">
      <rect x="372" y="50" width="256" height="23" class="dark" />
      
      <rect x="372" y="78" width="256" height="277" class="dark" />
      
      <!-- Cutouts and details in Piston Head -->
      <path class="light" d="M 388 165 L 402 165 L 402 300 L 388 335 L 388 165 Z" />
      <polygon class="light" points="388,165 402,165 440,88 426,88" />
      
      <path class="light" d="M 598 165 L 612 165 L 612 335 L 598 300 L 598 165 Z" />
      <polygon class="light" points="598,165 612,165 574,88 560,88" />

      <!-- Central Arch Cutout -->
      <path class="light" d="M 402 355 L 413 355 L 413 283 C 413 234, 452 196, 500 196 C 548 196, 587 234, 587 283 L 587 355 L 598 355 L 598 283 C 598 228, 554 184, 500 184 C 446 184, 402 228, 402 283 Z" fill="#FFFFFF"/>
      <path class="bg" d="M 413 355 L 413 283 C 413 234, 452 196, 500 196 C 548 196, 587 234, 587 283 L 587 355 Z" fill="#FFFFFF" />

      <circle cx="500" cy="205" r="22" class="light" />
    </g>

    <!-- Connecting Rod -->
    <!-- The central rod has left dark, left-inner light, middle dark, right-inner light, right dark -->
    <rect x="468" y="280" width="64" height="500" class="dark" />
    <rect x="481" y="280" width="8" height="500" class="light" />
    <rect x="511" y="280" width="8" height="500" class="light" />
    
    <!-- Base Bottom Circle / Rod End -->
    <g id="piston-base">
      <path class="dark" d="M 413 750 L 587 750 L 587 910 L 413 910 Z" />
      <circle cx="500" cy="830" r="85" class="dark" />
      
      <circle cx="500" cy="830" r="35" class="light" />
      <circle cx="500" cy="830" r="60" class="bg" stroke="#FDE8EA" stroke-width="5" opacity="0.8" />
      
      <!-- Side attachment bulges details -->
      <rect x="413" y="730" width="10" height="20" class="dark" />
      <rect x="577" y="730" width="10" height="20" class="dark" />
      
      <!-- Additional detailed shapes on the bottom piece -->
      <path class="dark" d="M 413 720 L 423 720 L 423 780 L 413 780 Z" />
      <path class="dark" d="M 577 720 L 587 720 L 587 780 L 577 780 Z" />
      <path class="dark" d="M 413 880 L 423 880 L 423 940 L 413 940 Z" />
      <path class="dark" d="M 577 880 L 587 880 L 587 940 L 577 940 Z" />
      
      <!-- Better curved sides for the base block -->
      <path class="dark" d="M 413 726 L 421 726 C 424 746, 434 762, 450 774 L 450 726 L 413 726 Z" fill="#FFFFFF"/>
      
      <!-- Re-drawing bottom part clean -->
      <circle cx="500" cy="830" r="86" class="dark" />
      <rect x="414" y="726" width="172" height="204" rx="10" class="dark" />
      
      <!-- Corner masking to get the correct shape -->
      <path d="M 414 746 C 430 746, 440 760, 440 786 L 414 786 Z" fill="#FFFFFF" />
      <path d="M 586 746 C 570 746, 560 760, 560 786 L 586 786 Z" fill="#FFFFFF" />
      <path d="M 414 914 C 430 914, 440 900, 440 874 L 414 874 Z" fill="#FFFFFF" />
      <path d="M 586 914 C 570 914, 560 900, 560 874 L 586 874 Z" fill="#FFFFFF" />
      
      <!-- Base Outer additions -->
      <rect x="414" y="736" width="8" height="50" rx="3" class="dark" />
      <rect x="578" y="736" width="8" height="50" rx="3" class="dark" />
      <rect x="414" y="874" width="8" height="50" rx="3" class="dark" />
      <rect x="578" y="874" width="8" height="50" rx="3" class="dark" />

      <!-- Base Center Accents -->
      <circle cx="500" cy="830" r="35" class="light" />
      <path class="light" d="M 454 830 A 46 46 0 0 0 546 830" fill="none" stroke-width="5" />
      <path class="light" d="M 454 830 A 46 46 0 0 1 546 830" fill="none" stroke-width="5" />
      <circle cx="500" cy="830" r="58" fill="none" stroke="#FDE8EA" stroke-width="6" />

      <!-- Horizontal separator in base -->
      <rect x="440" y="776" width="120" height="6" class="dark" />
    </g>
  </g>
</svg>