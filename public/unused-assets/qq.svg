<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <linearGradient id="dark-metal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D3138" />
      <stop offset="50%" stop-color="#111317" />
      <stop offset="100%" stop-color="#08090A" />
    </linearGradient>

    <!-- Super realistic chrome/steel -->
    <linearGradient id="chrome-grad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="25%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#717A87" />
      <stop offset="50%" stop-color="#111317" />
      <stop offset="55%" stop-color="#717A87" />
      <stop offset="85%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#2D3138" />
    </linearGradient>

    <!-- Vibrant Anodized Red -->
    <linearGradient id="anodized-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" />
      <stop offset="20%" stop-color="#DC2626" />
      <stop offset="50%" stop-color="#991B1B" />
      <stop offset="80%" stop-color="#450A0A" />
      <stop offset="100%" stop-color="#1A0000" />
    </linearGradient>
    
    <g id="sleek-tooth">
      <path d="M 480 160 L 520 160 L 510 200 L 490 200 Z" fill="url(#anodized-red)" />
      <path d="M 480 160 L 500 160 L 495 200 L 490 200 Z" fill="#FF8888" opacity="0.6" />
    </g>
  </defs>

  <g transform="translate(500, 500)">
    <!-- Asymmetric background gear ring for modern flair -->
    <g transform="rotate(-15)">
      <circle cx="0" cy="0" r="300" fill="url(#dark-metal-bg)" stroke="url(#chrome-grad)" stroke-width="12" />
      <circle cx="0" cy="0" r="260" fill="none" stroke="url(#anodized-red)" stroke-width="50" opacity="0.95" />
      
      <g>
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(0 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(30 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(60 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(90 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(120 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(150 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(180 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(210 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(240 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(270 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(300 500 500)" />
        <use href="#sleek-tooth" transform="translate(-500,-500) rotate(330 500 500)" />
      </g>
      
      <!-- Inner rim highlights -->
      <circle cx="0" cy="0" r="235" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.4" />
      <circle cx="0" cy="0" r="285" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" />
    </g>

    <!-- Angled Piston (Dynamics/Speed) -->
    <g transform="rotate(35) translate(0, -60)">
      <!-- Skirt and Body -->
      <path d="M -130 -160 C -130 -190 -70 -210 0 -210 C 70 -210 130 -190 130 -160 L 130 50 C 130 70 100 100 60 110 C 60 110 30 120 0 120 C -30 120 -60 110 -60 110 C -100 100 -130 70 -130 50 Z" fill="url(#chrome-grad)" />
      
      <!-- Crown Top -->
      <ellipse cx="0" cy="-170" rx="130" ry="30" fill="url(#dark-metal-bg)" stroke="url(#chrome-grad)" stroke-width="6" />
      
      <!-- Deep ring grooves -->
      <path d="M -130 -110 C -60 -80 60 -80 130 -110 L 130 -90 C 60 -60 -60 -60 -130 -90 Z" fill="#08090A" />
      <path d="M -130 -60 C -60 -30 60 -30 130 -60 L 130 -40 C 60 -10 -60 -10 -130 -40 Z" fill="#08090A" />

      <!-- Piston Pin Area -->
      <ellipse cx="0" cy="10" rx="40" ry="50" fill="#08090A" stroke="url(#chrome-grad)" stroke-width="3" />
      <ellipse cx="0" cy="10" rx="30" ry="40" fill="url(#dark-metal-bg)" />
      
      <!-- Thick Structural Rod Base -->
      <path d="M -40 50 L -60 250 A 20 20 0 0 0 -40 270 L 40 270 A 20 20 0 0 0 60 250 L 40 50 Z" fill="url(#chrome-grad)" />
      <path d="M -20 65 L -35 240 A 10 10 0 0 0 -25 250 L 25 250 A 10 10 0 0 0 35 240 L 20 65 Z" fill="#0A0B0E" />

      <!-- Rod Cap -->
      <path d="M -90 270 L 90 270 C 110 270 120 300 120 320 Q 120 360 0 360 Q -120 360 -120 320 C -120 300 -110 270 -90 270 Z" fill="url(#chrome-grad)" />
      <circle cx="0" cy="305" r="35" fill="#08090A" stroke="url(#chrome-grad)" stroke-width="5" />
      
      <!-- Bolts -->
      <rect x="-105" y="295" width="20" height="30" rx="5" fill="url(#chrome-grad)" transform="rotate(-15 -95 310)" />
      <rect x="85" y="295" width="20" height="30" rx="5" fill="url(#chrome-grad)" transform="rotate(15 95 310)" />
    </g>
  </g>
</svg>