<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#D1D5DB" />
      <stop offset="75%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#6B7280" />
    </linearGradient>

    <linearGradient id="metalRibs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9CA3AF" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#6B7280" />
    </linearGradient>

    <linearGradient id="redGear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="50%" stop-color="#DC2626" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
    
    <g id="gear-tooth">
      <path d="M 470 140 L 530 140 L 520 200 L 480 200 Z" fill="url(#redGear)" />
    </g>

    <g id="gear">
      <use href="#gear-tooth" />
      <use href="#gear-tooth" transform="rotate(22.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(45 500 400)" />
      <use href="#gear-tooth" transform="rotate(67.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(90 500 400)" />
      <use href="#gear-tooth" transform="rotate(112.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(135 500 400)" />
      <use href="#gear-tooth" transform="rotate(157.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(180 500 400)" />
      <use href="#gear-tooth" transform="rotate(202.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(225 500 400)" />
      <use href="#gear-tooth" transform="rotate(247.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(270 500 400)" />
      <use href="#gear-tooth" transform="rotate(292.5 500 400)" />
      <use href="#gear-tooth" transform="rotate(315 500 400)" />
      <use href="#gear-tooth" transform="rotate(337.5 500 400)" />
      <circle cx="500" cy="400" r="230" fill="none" stroke="url(#redGear)" stroke-width="40" />
    </g>

    <g id="wing">
      <polygon points="340,240 60,240 100,310 320,310" fill="#111111" stroke="url(#metal)" stroke-width="12" stroke-linejoin="round" />
      <polygon points="305,335 110,335 150,405 285,405" fill="#111111" stroke="url(#metal)" stroke-width="12" stroke-linejoin="round" />
      <polygon points="270,430 160,430 200,500 250,500" fill="#111111" stroke="url(#metal)" stroke-width="12" stroke-linejoin="round" />
      <polygon points="235,525 210,525 225,565 230,565" fill="#111111" stroke="url(#metal)" stroke-width="12" stroke-linejoin="round" />
    </g>
  </defs>

  <use href="#wing" />
  <use href="#wing" transform="scale(-1, 1) translate(-1000, 0)" />

  <use href="#gear" />

  <g id="piston">
    <path d="M 390 80 L 610 80 C 621 80 630 89 630 100 L 630 260 C 630 271 621 280 610 280 L 390 280 C 379 280 370 271 370 260 L 370 100 C 370 89 379 80 390 80 Z" 
          fill="#111111" stroke="url(#metal)" stroke-width="16" stroke-linejoin="round" />
    
    <line x1="370" y1="120" x2="630" y2="120" stroke="url(#metalRibs)" stroke-width="14" />
    <line x1="370" y1="150" x2="630" y2="150" stroke="url(#metalRibs)" stroke-width="14" />
    <line x1="370" y1="180" x2="630" y2="180" stroke="url(#metalRibs)" stroke-width="14" />
    
    <circle cx="500" cy="225" r="30" fill="#111111" stroke="url(#metal)" stroke-width="14" />
    <circle cx="500" cy="225" r="10" fill="url(#metal)" />
    
    <rect x="460" y="280" width="80" height="340" fill="#111111" stroke="url(#metal)" stroke-width="16" stroke-linejoin="round" />
    
    <line x1="485" y1="300" x2="485" y2="590" stroke="url(#metal)" stroke-width="8" stroke-linecap="round" />
    <line x1="515" y1="300" x2="515" y2="590" stroke="url(#metal)" stroke-width="8" stroke-linecap="round" />
    
    <rect x="410" y="600" width="180" height="70" rx="35" fill="#111111" stroke="url(#metal)" stroke-width="16" stroke-linejoin="round" />
    
    <circle cx="500" cy="635" r="50" fill="#111111" stroke="url(#metal)" stroke-width="16" />
    <circle cx="500" cy="635" r="25" fill="none" stroke="url(#metal)" stroke-width="12" />
    
    <circle cx="440" cy="635" r="8" fill="url(#metal)" />
    <circle cx="560" cy="635" r="8" fill="url(#metal)" />
  </g>
</svg>